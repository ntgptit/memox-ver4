<!-- @dsCard group="Colors" viewport="700x270" name="Semantic" subtitle="Success · warning · error · info, solid + soft" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html,body{margin:0}
  body{background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:14px}
  .sw{width:150px}
  .sw .chip{height:56px;border-radius:14px;box-shadow:inset 0 0 0 1px var(--memox-border)}
  .sw .nm{font-size:12.5px;font-weight:700;margin-top:9px;letter-spacing:-.01em}
  .sw .tk{font-size:11px;color:var(--memox-text-tertiary);font-family:var(--memox-font-mono);margin-top:2px}

</style></head><body><div class="swatches">
<div class="sw"><div class="chip" style="background:var(--memox-success);color:var(--memox-on-success);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Success</div><div class="tk">--memox-success</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-warning);color:var(--memox-on-warning);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Warning</div><div class="tk">--memox-warning</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-error);color:var(--memox-on-error);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Error</div><div class="tk">--memox-error</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-info);color:var(--memox-on-info);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Info</div><div class="tk">--memox-info</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-success-soft);color:var(--memox-on-success-soft);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Success soft</div><div class="tk">--memox-success-soft</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-warning-soft);color:var(--memox-on-warning-soft);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Warning soft</div><div class="tk">--memox-warning-soft</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-error-soft);color:var(--memox-on-error-soft);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Error soft</div><div class="tk">--memox-error-soft</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-info-soft);color:var(--memox-on-info-soft);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Info soft</div><div class="tk">--memox-info-soft</div></div>
</div></body></html>
