<!-- @dsCard group="Colors" viewport="700x150" name="Text" subtitle="Three-step text hierarchy" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html,body{margin:0}
  body{background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:14px}
  .sw{width:150px}
  .sw .chip{height:56px;border-radius:14px;box-shadow:inset 0 0 0 1px var(--memox-border)}
  .sw .nm{font-size:12.5px;font-weight:700;margin-top:9px;letter-spacing:-.01em}
  .sw .tk{font-size:11px;color:var(--memox-text-tertiary);font-family:var(--memox-font-mono);margin-top:2px}
  .tline{display:flex;flex-direction:column;gap:10px}.tline div{font-size:22px;font-weight:700}
</style></head><body>
<div class="tline">
<div style="color:var(--memox-text)">Primary text — Recall before reveal &nbsp;<span style="font-family:var(--memox-font-mono);font-size:12px;color:var(--memox-text-tertiary)">--memox-text</span></div>
<div style="color:var(--memox-text-secondary);font-weight:600">Secondary — 48 cards due today &nbsp;<span style="font-family:var(--memox-font-mono);font-size:12px">--memox-text-secondary</span></div>
<div style="color:var(--memox-text-tertiary);font-weight:600">Tertiary — last reviewed 2h ago &nbsp;<span style="font-family:var(--memox-font-mono);font-size:12px">--memox-text-tertiary</span></div>
</div></body></html>
