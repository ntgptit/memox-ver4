<!-- @dsCard group="Spacing" viewport="700x190" name="Elevation" subtitle="Soft blue-grey card shadows (light)" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html,body{margin:0}
  body{background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:14px}
  .sw{width:150px}
  .sw .chip{height:56px;border-radius:14px;box-shadow:inset 0 0 0 1px var(--memox-border)}
  .sw .nm{font-size:12.5px;font-weight:700;margin-top:9px;letter-spacing:-.01em}
  .sw .tk{font-size:11px;color:var(--memox-text-tertiary);font-family:var(--memox-font-mono);margin-top:2px}
  .ee{display:flex;gap:24px;flex-wrap:wrap}
.ee .b{width:130px;height:80px;background:var(--memox-surface);border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--memox-text-secondary)}
</style></head><body>
<div class="ee">
<div class="b" style="box-shadow:var(--memox-shadow-sm)">shadow-sm</div>
<div class="b" style="box-shadow:var(--memox-shadow-card)">shadow-card</div>
<div class="b" style="box-shadow:var(--memox-shadow-lg)">shadow-lg</div>
<div class="b" style="box-shadow:var(--memox-shadow-fab);background:var(--memox-primary);color:var(--memox-on-primary)">shadow-fab</div>
</div></body></html>
