<!-- @dsCard group="Colors" viewport="700x150" name="Brand & Primary" subtitle="Indigo primary + cyan accent (Tokyo light values)" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html,body{margin:0}
  body{background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:14px}
  .sw{width:150px}
  .sw .chip{height:56px;border-radius:14px;box-shadow:inset 0 0 0 1px var(--memox-border)}
  .sw .nm{font-size:12.5px;font-weight:700;margin-top:9px;letter-spacing:-.01em}
  .sw .tk{font-size:11px;color:var(--memox-text-tertiary);font-family:var(--memox-font-mono);margin-top:2px}

</style></head><body><div class="swatches">
<div class="sw"><div class="chip" style="background:var(--memox-primary);color:var(--memox-on-primary);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Primary</div><div class="tk">--memox-primary</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-primary-strong);color:var(--memox-on-primary);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Primary strong</div><div class="tk">--memox-primary-strong</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-primary-soft);color:var(--memox-on-primary-soft);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Primary soft</div><div class="tk">--memox-primary-soft</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-accent);color:var(--memox-on-accent);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Accent</div><div class="tk">--memox-accent</div></div>
<div class="sw"><div class="chip" style="background:var(--memox-accent-soft);color:var(--memox-on-accent);display:flex;align-items:center;justify-content:center;font-weight:800;">Aa</div><div class="nm">Accent soft</div><div class="tk">--memox-accent-soft</div></div>
</div></body></html>
