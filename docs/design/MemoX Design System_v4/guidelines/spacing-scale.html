<!-- @dsCard group="Spacing" viewport="700x300" name="Spacing scale" subtitle="4px base · space-1 → space-10" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html,body{margin:0}
  body{background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:14px}
  .sw{width:150px}
  .sw .chip{height:56px;border-radius:14px;box-shadow:inset 0 0 0 1px var(--memox-border)}
  .sw .nm{font-size:12.5px;font-weight:700;margin-top:9px;letter-spacing:-.01em}
  .sw .tk{font-size:11px;color:var(--memox-text-tertiary);font-family:var(--memox-font-mono);margin-top:2px}
  .sr{display:flex;align-items:center;gap:14px;margin-bottom:9px}
.sr .bar{height:18px;background:var(--memox-primary);border-radius:5px}
.sr .t{font-family:var(--memox-font-mono);font-size:11px;color:var(--memox-text-tertiary);width:130px}
</style></head><body>
<div>
<div class="sr"><div class="bar" style="width:4px"></div><div class="t">--space-1</div><div style="font-size:12px;color:var(--memox-text-secondary)">4px</div></div><div class="sr"><div class="bar" style="width:8px"></div><div class="t">--space-2</div><div style="font-size:12px;color:var(--memox-text-secondary)">8px</div></div><div class="sr"><div class="bar" style="width:12px"></div><div class="t">--space-3</div><div style="font-size:12px;color:var(--memox-text-secondary)">12px</div></div><div class="sr"><div class="bar" style="width:16px"></div><div class="t">--space-4</div><div style="font-size:12px;color:var(--memox-text-secondary)">16px</div></div><div class="sr"><div class="bar" style="width:20px"></div><div class="t">--space-5</div><div style="font-size:12px;color:var(--memox-text-secondary)">20px</div></div><div class="sr"><div class="bar" style="width:24px"></div><div class="t">--space-6</div><div style="font-size:12px;color:var(--memox-text-secondary)">24px</div></div><div class="sr"><div class="bar" style="width:32px"></div><div class="t">--space-7</div><div style="font-size:12px;color:var(--memox-text-secondary)">32px</div></div><div class="sr"><div class="bar" style="width:40px"></div><div class="t">--space-8</div><div style="font-size:12px;color:var(--memox-text-secondary)">40px</div></div><div class="sr"><div class="bar" style="width:48px"></div><div class="t">--space-9</div><div style="font-size:12px;color:var(--memox-text-secondary)">48px</div></div><div class="sr"><div class="bar" style="width:64px"></div><div class="t">--space-10</div><div style="font-size:12px;color:var(--memox-text-secondary)">64px</div></div>
</div></body></html>
