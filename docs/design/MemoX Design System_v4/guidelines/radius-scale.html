<!-- @dsCard group="Spacing" viewport="700x180" name="Radius scale" subtitle="xs → 2xl + role aliases" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html,body{margin:0}
  body{background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:14px}
  .sw{width:150px}
  .sw .chip{height:56px;border-radius:14px;box-shadow:inset 0 0 0 1px var(--memox-border)}
  .sw .nm{font-size:12.5px;font-weight:700;margin-top:9px;letter-spacing:-.01em}
  .sw .tk{font-size:11px;color:var(--memox-text-tertiary);font-family:var(--memox-font-mono);margin-top:2px}
  .rr{display:flex;gap:16px;flex-wrap:wrap}
.rr .b{width:84px;height:64px;background:var(--memox-primary-soft);box-shadow:inset 0 0 0 1.5px var(--memox-primary)}
.rr .nm{font-size:11px;font-family:var(--memox-font-mono);color:var(--memox-text-tertiary);margin-top:6px;text-align:center}
</style></head><body>
<div class="rr">
<div><div class="b" style="border-radius:var(--memox-radius-xs)"></div><div class="nm">xs</div></div><div><div class="b" style="border-radius:var(--memox-radius-sm)"></div><div class="nm">sm</div></div><div><div class="b" style="border-radius:var(--memox-radius-md)"></div><div class="nm">md</div></div><div><div class="b" style="border-radius:var(--memox-radius-lg)"></div><div class="nm">lg</div></div><div><div class="b" style="border-radius:var(--memox-radius-xl)"></div><div class="nm">xl</div></div><div><div class="b" style="border-radius:var(--memox-radius-card)"></div><div class="nm">card</div></div><div><div class="b" style="border-radius:var(--memox-radius-pill)"></div><div class="nm">pill</div></div>
</div></body></html>
