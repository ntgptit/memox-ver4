<!DOCTYPE html><html lang="en"><head><meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html,body{margin:0}
  body{background:var(--memox-bg);font-family:var(--memox-font-sans);color:var(--memox-text);padding:22px}
  .swatches{display:flex;flex-wrap:wrap;gap:14px}

<div style="font-size:62px;font-weight:800;letter-spacing:-.03em;line-height:1">Aa Bb Cc</div>
<div style="font-size:22px;font-weight:600;margin-top:10px;letter-spacing:-.01em">ABCDEFGHIJKLM nopqrstuvwxyz 0123456789</div>
<div style="font-size:13px;color:var(--memox-text-tertiary);font-family:var(--memox-font-mono);margin-top:10px">--memox-font-sans</div>
