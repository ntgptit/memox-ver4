  .mxg-stepper .mxg-label { min-width: 96px; text-align: center; font-size: 13px; font-weight: 700; letter-spacing: .02em; text-transform: capitalize; color: #2a3357; }

  .mxg-frames { display: flex; gap: 22px; justify-content: center; flex-wrap: wrap; }

  .mxg-cap[data-theme="dark"] { color: #7b84a3; }

const SCREENS = [

  { id: 'game-matching', title: 'Matching', Comp: () => window.GameMatching, states: ['playing', 'selected', 'correct', 'wrong', 'almost', 'complete'] },
  { id: 'game-mc', title: 'Multiple Choice', Comp: () => window.GameMultipleChoice, states: ['waiting', 'correct', 'wrong', 'complete'] },
  { id: 'game-recall', title: 'Recall', Comp: () => window.GameRecall, states: ['before-reveal', 'revealed', 'forgot', 'remembered', 'complete'] },
  { id: 'game-typing', title: 'Typing', Comp: () => window.GameTyping, states: ['waiting', 'typing', 'hint', 'correct', 'wrong', 'complete'] },
  { id: 'review', title: 'Review', Comp: () => window.Review, states: ['browsing', 'editing', 'audio', 'loading', 'error', 'end'] },
  { id: 'player', title: 'Player', Comp: () => window.Player, states: ['playing', 'paused', 'speed', 'error', 'end'] },
  { id: 'study-result', title: 'Study Result', Comp: () => window.StudyResult, states: ['standard', 'goal-met', 'goal-missed', 'many-wrong', 'finalizing', 'retry-finalize', 'finalize-error'] },
  { id: 'search', title: 'Search', Comp: () => window.Search, states: ['empty-recent', 'results', 'filtered', 'no-results', 'loading'] },
  { id: 'statistics', title: 'Stats', Comp: () => window.Statistics, states: ['loaded', 'scope-switch', 'insufficient', 'loading', 'error'] },
  { id: 'reminder', title: 'Reminders', Comp: () => window.Reminder, states: ['on', 'off', 'time-picker'] },
  { id: 'account-sync', title: 'Account & Sync', Comp: () => window.AccountSync, states: ['signed-out', 'signed-in', 'syncing', 'conflict', 'offline'] },
  { id: 'theme', title: 'Theme', Comp: () => window.Theme, states: ['light', 'dark', 'accent-size'] },
  { id: 'import', title: 'Import', Comp: () => window.Import, states: ['source', 'mapping', 'preview', 'dup-warning', 'importing', 'import-error', 'done'] },
  { id: 'export', title: 'Export', Comp: () => window.Export, states: ['config', 'exporting', 'export-error', 'done'] },
  { id: 'drawer', title: 'Drawer & Languages', Comp: () => window.Drawer, states: ['open', 'add-language', 'remove-language'] },
  { id: 'study-session', title: 'Study Session (5 stages)', Comp: () => window.StudySession, states: ['stage1-review', 'stage2-matching', 'stage3-choice', 'stage4-recall', 'stage5-typing', 'relearn', 'due-review', 'exit', 'resume-error', 'answer-save-error'] },
  { id: 'settings', title: 'Settings', Comp: () => window.Settings, states: ['loaded', 'group-expanded', 'value-picker'] },
  { id: 'app-bar', title: 'App Bar (shared)', Comp: () => window.AppBar, states: ['root-top', 'root-scrolled', 'root-unread', 'root-long', 'root-standard', 'nested', 'nested-overflow', 'search', 'selection', 'focused'] },
];

// A single screen failing (compile error, runtime throw, or not loaded — e.g.
// opened over file:// where Babel can't fetch the .jsx) must NOT blank the whole
// gallery. Each frame is isolated and degrades to a visible message instead.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    if (this.state.err) {
      return <div style={{ padding: '16px', color: 'var(--memox-error)', fontSize: '13px', fontWeight: 600 }}>⚠ {String(this.state.err && this.state.err.message || this.state.err)}</div>;
    }
    return this.props.children;
  }
}

function Frame({ theme, Comp, state }) {
  return (
    <div className="mxg-frame-wrap">
      <div className="mxg-frame" data-theme={theme}>
        <ErrorBoundary>
          {typeof Comp === 'function'
            ? <Comp state={state} />
            : <div style={{ padding: '16px', color: 'var(--memox-text-tertiary)', fontSize: '13px' }}>Screen not loaded — serve over http:// (e.g. <code>node tool/preview/kit-server.mjs</code>), not file://.</div>}
        </ErrorBoundary>
      </div>
      <div className="mxg-cap" data-theme={theme}>{theme}</div>
    </div>
  );
}

function Row({ screen }) {
  const [i, setI] = React.useState(0);
  const states = screen.states;
  const st = states[i];
  const Comp = screen.Comp();
  const go = (d) => setI((p) => (p + d + states.length) % states.length);
  return (
    <section className="mxg-row" data-screen-label={screen.id}>
      <div className="mxg-row__head">
        <div>
          <div className="mxg-row__title">{screen.title}</div>
          <div className="mxg-row__sub">{states.length} state{states.length > 1 ? 's' : ''} · light + dark</div>
        </div>
        <div className="mxg-stepper">
          <button onClick={() => go(-1)} aria-label="Previous state"><span className="material-symbols-rounded">chevron_left</span></button>
          <div className="mxg-label">{st.replace('-', ' ')}</div>
          <button onClick={() => go(1)} aria-label="Next state"><span className="material-symbols-rounded">chevron_right</span></button>
        </div>
      </div>
      <div className="mxg-frames">
        <Frame theme="light" Comp={Comp} state={st} />
        <Frame theme="dark" Comp={Comp} state={st} />
      </div>
    </section>
  );
}

function Gallery() {
  return <div className="mxg-gallery">{SCREENS.map((s) => <Row key={s.id} screen={s} />)}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Gallery />);
</script>
<script>
/* Local preview fix: the kit's feature files end with a compiler-only
   `export const X = ...` line and register their component on a window
   registry via an IIFE. Loaded as a classic <script>, that top-level
   `export` is a parse error, so the whole file aborts and the page falls
   back to the (separately broken) bundled copies. Here we load each file
   ourselves, strip the ESM line, transpile, and run in document order so
   the real per-file components register and win. */
(function () {
  function strip(code) {
    return code
      .replace(/^[ \t]*export[ \t].*$/gm, '')
      .replace(/^[ \t]*import[ \t].*$/gm, '');
  }
  function run(code, label) {
    var out = Babel.transform(code, { presets: ['react'], filename: label }).code;
    var s = document.createElement('script');
    s.textContent = out + '\n//# sourceURL=' + label;
    document.head.appendChild(s);
  }
  async function boot() {
    var srcs = Array.prototype.slice.call(
      document.querySelectorAll('script[type="text/babel-src"]')
    ).map(function (t) { return t.getAttribute('src'); });
    // Fetch every file in parallel, then execute in document order.
    var texts = await Promise.all(srcs.map(function (src) {
      return fetch(src).then(function (r) { return r.text(); })
        .catch(function (e) { console.error('kit fetch failed:', src, e); return ''; });
    }));
    for (var i = 0; i < srcs.length; i++) {
      if (!texts[i]) continue;
      try { run(strip(texts[i]), srcs[i]); }
      catch (e) { console.error('kit run failed:', srcs[i], e); }
    }
    var g = document.querySelector('script[type="text/babel-gallery"]');
    if (g) run(strip(g.textContent), 'gallery.jsx');
  }
  boot();
})();
</script>
