  html, body { margin: 0; }

  .mxg-gallery { display: flex; flex-direction: column; gap: 28px; max-width: 880px; margin: 0 auto; }

  .mxg-row { background: #ffffff; border-radius: 24px; padding: 22px; box-shadow: 0 10px 30px rgba(40, 55, 95, .08), 0 2px 4px rgba(40, 55, 95, .06); }
  .mxg-row__head { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; }

  .mxg-stepper { display: inline-flex; align-items: center; gap: 6px; background: #f0f3f9; border-radius: 999px; padding: 5px; }
  .mxg-stepper button { width: 34px; height: 34px; border: none; border-radius: 999px; background: #ffffff; color: #2a3357; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 1px 2px rgba(40,55,95,.12); transition: transform .12s ease, background .15s ease; }
  .mxg-stepper button:hover { background: #5569ff; color: #fff; }
  .mxg-stepper button:active { transform: scale(.9); }
  .mxg-stepper .mxg-label { min-width: 96px; text-align: center; font-size: 13px; font-weight: 700; letter-spacing: .02em; text-transform: capitalize; color: #2a3357; }

  .mxg-frames { display: flex; gap: 22px; justify-content: center; flex-wrap: wrap; }
  .mxg-frame-wrap { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1 1 390px; max-width: 390px; min-width: 0; }
  /* The device mock is a fixed 390x780 (the kit's design width). On narrow viewports the
     scaler shrinks the whole frame to fit its container and reserves the SCALED footprint,
     so the frame never bulges past the gallery card. Scale is set inline per measured width. */
  .mxg-frame-scaler { position: relative; max-width: 100%; }
  .mxg-frame {
    position: absolute; top: 0; left: 0;
    width: 390px; height: 780px;
    border-radius: 44px;
    overflow: hidden;
    background: var(--memox-bg);
    box-shadow: 0 0 0 9px #11152b, 0 0 0 11px #2a2f4a, 0 22px 48px rgba(20, 28, 56, .32);
    transform-origin: top left;
  }
  .mxg-frame[data-theme="dark"] { box-shadow: 0 0 0 9px #05081a, 0 0 0 11px #232a47, 0 22px 48px rgba(0, 0, 0, .5); }
  .mxg-frame > .app { width: 100%; height: 100%; }
  .mxg-cap { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: #8089a3; }
  .mxg-cap[data-theme="dark"] { color: #7b84a3; }

  /* skeleton shimmer — resolves per-theme via tokens */
  @keyframes mxg-pulse { 0%,100% { opacity: .5; } 50% { opacity: 1; } }
  .mxg-skel { background: var(--memox-surface-sunken); animation: mxg-pulse var(--memox-duration-pulse) ease-in-out infinite; }
  .material-symbols-rounded { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; user-select: none; }

// A single screen failing (compile error, runtime throw, or not loaded — e.g.
// opened over file:// where Babel can't fetch the .jsx) must NOT blank the whole
// gallery. Each frame is isolated and degrades to a visible message instead.
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err }; }
  render() {
    if (this.state.err) {
      return <div style={{ padding: '16px', color: 'var(--memox-error)', fontSize: '13px', fontWeight: 600 }}>⚠ {String(this.state.err && this.state.err.message || this.state.err)}</div>;
    }
    return this.props.children;
  }
}

const FRAME_W = 390, FRAME_H = 780;
function Frame({ theme, Comp, state }) {
  const wrapRef = React.useRef(null);
  const [scale, setScale] = React.useState(1);
  React.useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    setScale(Math.min(1, el.clientWidth / FRAME_W));
    // Read the post-layout width from the observer entry (a synchronous clientWidth read
    // can be stale mid-resize), so the frame rescales correctly on orientation changes.
    const ro = new ResizeObserver(([entry]) => {
      const w = entry.contentRect.width;
      if (w) setScale(Math.min(1, w / FRAME_W));
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);
  return (
    <div className="mxg-frame-wrap" ref={wrapRef}>
      <div className="mxg-frame-scaler" style={{ width: FRAME_W * scale, height: FRAME_H * scale }}>
        <div className="mxg-frame" data-theme={theme} style={{ transform: `scale(${scale})` }}>
          <ErrorBoundary>
            {typeof Comp === 'function'
              ? <Comp state={state} />
              : <div style={{ padding: '16px', color: 'var(--memox-text-tertiary)', fontSize: '13px' }}>Screen not loaded — serve over http:// (e.g. <code>node tool/preview/kit-server.mjs</code>), not file://.</div>}
          </ErrorBoundary>
        </div>
      </div>
      <div className="mxg-cap" data-theme={theme}>{theme}</div>
    </div>
  );
}

function Row({ screen }) {
  const [i, setI] = React.useState(0);
  const states = screen.states;
  const st = states[i];
  const Comp = screen.Comp();
  const go = (d) => setI((p) => (p + d + states.length) % states.length);
  return (
    <section className="mxg-row" data-screen-label={screen.id}>
      <div className="mxg-row__head">
        <div>
          <div className="mxg-row__title">{screen.title}</div>
          <div className="mxg-row__sub">{states.length} state{states.length > 1 ? 's' : ''} · light + dark</div>
        </div>
        <div className="mxg-stepper">
          <button onClick={() => go(-1)} aria-label="Previous state"><span className="material-symbols-rounded">chevron_left</span></button>
          <div className="mxg-label">{st.replace('-', ' ')}</div>
          <button onClick={() => go(1)} aria-label="Next state"><span className="material-symbols-rounded">chevron_right</span></button>
        </div>
      </div>
      <div className="mxg-frames">
        <Frame theme="light" Comp={Comp} state={st} />
        <Frame theme="dark" Comp={Comp} state={st} />
      </div>
    </section>
  );
}

function Gallery() {
  return <div className="mxg-gallery">{SCREENS.map((s) => <Row key={s.id} screen={s} />)}</div>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<Gallery />);
</script>
<script>
/* Local preview fix: the kit's feature files end with a compiler-only
   `export const X = ...` line and register their component on a window
   registry via an IIFE. Loaded as a classic <script>, that top-level
   `export` is a parse error, so the whole file aborts and the page falls
   back to the (separately broken) bundled copies. Here we load each file
   ourselves, strip the ESM line, transpile, and run in document order so
   the real per-file components register and win. */
(function () {
  function strip(code) {
    return code
      // drop ESM imports (React/etc. are provided as globals)
      .replace(/^[ \t]*import[ \t].*$/gm, '')
      // strip ONLY the `export` keyword, keeping the declaration — so a top-level
      // `export function MxButton(){}` stays a function declaration (→ global), while a
      // trailing `export const X = window.X` degrades to a harmless local const.
      .replace(/^([ \t]*)export[ \t]+/gm, '$1');
  }
  function run(code, label) {
    var out = Babel.transform(code, { presets: ['react'], filename: label }).code;
    var s = document.createElement('script');
    s.textContent = out + '\n//# sourceURL=' + label;
    document.head.appendChild(s);
  }
  async function boot() {
    var srcs = Array.prototype.slice.call(
      document.querySelectorAll('script[type="text/babel-src"]')
    ).map(function (t) { return t.getAttribute('src'); });
    // Fetch every file in parallel, then execute in document order.
    var texts = await Promise.all(srcs.map(function (src) {
      return fetch(src).then(function (r) { return r.text(); })
        .catch(function (e) { console.error('kit fetch failed:', src, e); return ''; });
    }));
    // NS shim: the ESM base primitives (MxButton…) drop their `export` on strip and become
    // Mx* globals; register each on the frozen namespace. This MUST run incrementally — after
    // every file — because screen modules destructure the primitives off NS at load time
    // (`const { MxScaffold, … } = NS`), so the base primitives (loaded first) have to be on NS
    // before any later screen module runs. Runtime-authored primitives already self-register.
    var NS = (window.MemoXDesignSystem_2ffa54 = window.MemoXDesignSystem_2ffa54 || {});
    function registerMx() {
      Object.keys(window).forEach(function (k) {
        if (/^Mx[A-Z]/.test(k) && typeof window[k] === 'function' && !NS[k]) NS[k] = window[k];
      });
    }
    for (var i = 0; i < srcs.length; i++) {
      if (!texts[i]) continue;
      try { run(strip(texts[i]), srcs[i]); }
      catch (e) { console.error('kit run failed:', srcs[i], e); }
      registerMx();
    }
    var g = document.querySelector('script[type="text/babel-gallery"]');
    if (g) run(strip(g.textContent), 'gallery.jsx');
  }
  boot();
})();
</script>
