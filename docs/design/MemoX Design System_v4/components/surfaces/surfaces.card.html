<!-- @dsCard group="Components" viewport="700x360" name="Surfaces" subtitle="Card · SectionHeader · IconTile · AppBar" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  html, body { margin: 0; }
  body { background: var(--memox-bg); font-family: var(--memox-font-sans); padding: 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; max-width: 652px; align-items: start; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const { MxCard, MxSectionHeader, MxIconTile, MxBadge } = window.MemoXDesignSystem_2ffa54;
function Row({ icon, tone, title, sub, badge }) {
  return (
    <div style={{ display:'flex', alignItems:'center', gap:'14px' }}>
      <MxIconTile icon={icon} tone={tone} />
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontWeight:700, fontSize:'15px', color:'var(--memox-text)' }}>{title}</div>
        <div style={{ fontSize:'13px', color:'var(--memox-text-secondary)' }}>{sub}</div>
      </div>
      {badge}
    </div>
  );
}
function Demo() {
  return (
    <div className="grid">
      <MxCard variant="primary">
        <div style={{ fontSize:'13px', opacity:.85, fontWeight:700 }}>DUE NOW</div>
        <div style={{ fontSize:'34px', fontWeight:800, lineHeight:1 }}>142</div>
        <div style={{ fontSize:'13px', opacity:.85 }}>cards across 6 decks</div>
      </MxCard>
      <MxCard>
        <MxSectionHeader title="Your decks" caption="6 active" action="See all" />
        <Row icon="style" tone="accent" title="Japanese N5" sub="48 due" badge={<MxBadge tone="warning" soft>48</MxBadge>} />
        <Row icon="functions" tone="success" title="Calculus" sub="On track" badge={<MxBadge tone="success" dot />} />
      </MxCard>
      <MxCard variant="primary-soft">
        <Row icon="local_fire_department" title="12-day streak" sub="Keep it going" />
      </MxCard>
      <MxCard variant="flat">
        <Row icon="bolt" tone="warning" title="Card flat surface" sub="Hairline border, no shadow" />
      </MxCard>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
